mirror-to-github:
  image: alpine/git:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  script:
    - git remote add github https://oauth2:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git
    - git push github HEAD:master --force
    - git push github --tags --force
  variables:
    GIT_STRATEGY: clone
    GITHUB_USER: "devrazox"
    GITHUB_REPO: "AIS_Plugin_HomeAssistant"
