stages:
  - lock
  - mirror
  - release

pipeline-lock:
  stage: lock
  image: alpine:latest
  resource_group: master
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  script:
    - echo "Pipeline $CI_PIPELINE_ID acquired lock"

mirror-branch:
  stage: mirror
  image: alpine:latest
  needs: [pipeline-lock]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git
    - git push github HEAD:refs/heads/master --force
  variables:
    GIT_STRATEGY: clone
    GITHUB_USER: "devrazox"
    GITHUB_REPO: "AIS_Plugin_HomeAssistant"

mirror-tag:
  stage: mirror
  image: alpine:latest
  needs: [pipeline-lock]
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache git
  script:
    - git remote add github https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/${GITHUB_USER}/${GITHUB_REPO}.git
    - git push github ${CI_COMMIT_TAG} --force
  variables:
    GIT_STRATEGY: clone
    GITHUB_USER: "devrazox"
    GITHUB_REPO: "AIS_Plugin_HomeAssistant"

create-github-release:
  stage: release
  image: alpine:latest
  needs: [mirror-tag]
  rules:
    - if: '$CI_COMMIT_TAG'
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      NOTES=$(awk "/^## ${CI_COMMIT_TAG}/{found=1; next} /^## v/{found=0} found{print}" CHANGELOG.md)
      if [ -z "$NOTES" ]; then NOTES="Release ${CI_COMMIT_TAG}"; fi
      jq -n \
        --arg tag "${CI_COMMIT_TAG}" \
        --arg notes "${NOTES}" \
        '{tag_name: $tag, name: $tag, body: $notes, draft: false, prerelease: false}' | \
      curl -s -f -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Content-Type: application/json" \
        -d @- \
        "https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/releases"
  variables:
    GITHUB_USER: "devrazox"
    GITHUB_REPO: "AIS_Plugin_HomeAssistant"
