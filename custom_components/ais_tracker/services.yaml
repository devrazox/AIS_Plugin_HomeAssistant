update_viewport:
  name: Update Viewport
  description: Updates the map viewport bounding box used for dynamic AIS stream filtering.
  fields:
    min_lat:
      name: Min Latitude
      description: Southern boundary of the viewport.
      required: true
      selector:
        number:
          min: -90
          max: 90
          step: 0.0001
    min_lon:
      name: Min Longitude
      description: Western boundary of the viewport.
      required: true
      selector:
        number:
          min: -180
          max: 180
          step: 0.0001
    max_lat:
      name: Max Latitude
      description: Northern boundary of the viewport.
      required: true
      selector:
        number:
          min: -90
          max: 90
          step: 0.0001
    max_lon:
      name: Max Longitude
      description: Eastern boundary of the viewport.
      required: true
      selector:
        number:
          min: -180
          max: 180
          step: 0.0001
